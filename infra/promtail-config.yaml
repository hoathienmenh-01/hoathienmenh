server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Scrape logs from Docker containers via log files
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/log/containers/*.log

  # Scrape system logs
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          __path__: /var/log/syslog

  # Pipeline for parsing JSON logs from our apps
  - job_name: xuantoi-json
    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
            module: module
            time: time
      - labels:
          level:
          module:
      - timestamp:
          source: time
          format: RFC3339
    static_configs:
      - targets:
          - localhost
        labels:
          job: xuantoi
          app: api
          __path__: /var/log/xuantoi/*.log
