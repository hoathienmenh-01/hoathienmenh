<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="rough" x="0" y="0">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="7"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.94  0 0 0 0 0.90  0 0 0 0 0.80  0 0 0 0.55 0"/>
    </filter>
    <filter id="fibers" x="0" y="0">
      <feTurbulence type="turbulence" baseFrequency="0.018 0.4" numOctaves="2" seed="3"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.96  0 0 0 0 0.92  0 0 0 0 0.82  0 0 0 0.35 0"/>
    </filter>
  </defs>
  <rect width="400" height="400" fill="#f0e6cc"/>
  <rect width="400" height="400" filter="url(#fibers)" opacity="0.65"/>
  <rect width="400" height="400" filter="url(#rough)" opacity="0.35" mix-blend-mode="multiply"/>
