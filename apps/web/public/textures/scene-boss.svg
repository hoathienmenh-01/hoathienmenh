<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <radialGradient id="forge" cx="50%" cy="58%" r="38%">
      <stop offset="0%" stop-color="#e07a3a" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#b23b3b" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#b23b3b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="abyss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0d12"/>
      <stop offset="100%" stop-color="#1a0d0d"/>
    </linearGradient>
    <filter id="ember-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#abyss)"/>
  <rect width="1600" height="1000" fill="url(#forge)"/>
  <!-- Cracked floor lines -->
  <g stroke="#d04f4f" stroke-width="1.6" opacity="0.35" fill="none">
    <path d="M0 720 L200 700 L420 740 L640 690 L840 740 L1080 690 L1280 760 L1600 700"/>
    <path d="M0 820 L240 800 L500 840 L760 800 L1020 850 L1280 800 L1600 840"/>
  </g>
  <!-- Embers -->
  <g fill="#f0d56a" opacity="0.7" filter="url(#ember-blur)">
    <circle cx="180" cy="380" r="2"/>
    <circle cx="320" cy="300" r="1.6"/>
    <circle cx="540" cy="220" r="2.4"/>
    <circle cx="720" cy="320" r="1.8"/>
    <circle cx="980" cy="260" r="2.2"/>
    <circle cx="1240" cy="340" r="1.6"/>
    <circle cx="1420" cy="240" r="2"/>
  </g>
  <g fill="#e07a3a" opacity="0.55" filter="url(#ember-blur)">
    <circle cx="260" cy="500" r="3"/>
    <circle cx="460" cy="540" r="2.4"/>
    <circle cx="660" cy="470" r="3.6"/>
    <circle cx="880" cy="510" r="2.2"/>
    <circle cx="1100" cy="560" r="3"/>
    <circle cx="1320" cy="490" r="2.6"/>
  </g>
  <!-- Dark vignette -->
  <radialGradient id="vig" cx="50%" cy="55%" r="80%">
    <stop offset="55%" stop-color="#000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.6"/>
  </radialGradient>
  <rect width="1600" height="1000" fill="url(#vig)"/>
</svg>
