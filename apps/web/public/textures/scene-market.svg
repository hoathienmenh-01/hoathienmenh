<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <radialGradient id="market" cx="50%" cy="60%" r="70%">
      <stop offset="0%" stop-color="#3b3220" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#2a2418" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#1a1610" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="market-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#141008"/>
      <stop offset="100%" stop-color="#1c1810"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#market-bg)"/>
  <rect width="1600" height="1000" fill="url(#market)"/>
  <!-- Lantern row -->
  <g>
    <g fill="#d04f4f">
      <circle cx="120" cy="180" r="26"/>
      <circle cx="320" cy="160" r="22"/>
      <circle cx="520" cy="180" r="26"/>
      <circle cx="720" cy="170" r="24"/>
      <circle cx="920" cy="180" r="28"/>
      <circle cx="1120" cy="170" r="22"/>
      <circle cx="1320" cy="180" r="26"/>
      <circle cx="1500" cy="160" r="22"/>
    </g>
    <g fill="#f0d56a" opacity="0.5">
      <circle cx="120" cy="180" r="40"/>
      <circle cx="320" cy="160" r="36"/>
      <circle cx="520" cy="180" r="40"/>
      <circle cx="720" cy="170" r="38"/>
      <circle cx="920" cy="180" r="42"/>
      <circle cx="1120" cy="170" r="36"/>
      <circle cx="1320" cy="180" r="40"/>
      <circle cx="1500" cy="160" r="36"/>
    </g>
    <g stroke="#3b3220" stroke-width="1" opacity="0.7">
      <line x1="120" y1="180" x2="320" y2="160"/>
      <line x1="320" y1="160" x2="520" y2="180"/>
      <line x1="520" y1="180" x2="720" y2="170"/>
      <line x1="720" y1="170" x2="920" y2="180"/>
      <line x1="920" y1="180" x2="1120" y2="170"/>
      <line x1="1120" y1="170" x2="1320" y2="180"/>
      <line x1="1320" y1="180" x2="1500" y2="160"/>
    </g>
  </g>
  <!-- Stall silhouettes -->
  <g fill="#0a0904" opacity="0.95">
    <rect x="80" y="640" width="280" height="160"/>
    <polygon points="60,640 380,640 220,580"/>
    <rect x="440" y="640" width="280" height="160"/>
    <polygon points="420,640 740,640 580,580"/>
    <rect x="800" y="640" width="280" height="160"/>
    <polygon points="780,640 1100,640 940,580"/>
    <rect x="1160" y="640" width="280" height="160"/>
    <polygon points="1140,640 1460,640 1300,580"/>
  </g>
  <!-- Warm pavement glow -->
  <radialGradient id="glow" cx="50%" cy="80%" r="50%">
    <stop offset="0%" stop-color="#c9a45a" stop-opacity="0.32"/>
    <stop offset="100%" stop-color="#c9a45a" stop-opacity="0"/>
  </radialGradient>
  <rect width="1600" height="1000" fill="url(#glow)"/>
</svg>
