<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="ink-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <radialGradient id="moonglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff6e0" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#f2d789" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#f2d789" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="zenith" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#08090b"/>
      <stop offset="100%" stop-color="#131922"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#zenith)"/>
  <!-- Moon -->
  <circle cx="400" cy="280" r="120" fill="url(#moonglow)"/>
  <circle cx="400" cy="280" r="58" fill="#fff6e0" opacity="0.95"/>
  <!-- Bamboo silhouette -->
  <g stroke="#0a0a06" stroke-width="6" opacity="0.9" fill="none" stroke-linecap="round">
    <path d="M120 800 L120 460 Q120 440 138 440 L138 400 Q138 380 155 380 L155 320 Q155 300 172 300 L172 260"/>
    <path d="M680 800 L680 480 Q680 460 660 460 L660 420 Q660 400 642 400 L642 340 Q642 320 625 320 L625 280"/>
  </g>
  <g fill="#0a0a06" opacity="0.9">
    <path d="M138 440 q-30 -10 -50 -28 q24 -2 50 8 z"/>
    <path d="M155 380 q-28 -8 -46 -22 q22 -4 46 10 z"/>
    <path d="M172 300 q-26 -8 -42 -20 q20 -4 42 12 z"/>
    <path d="M660 460 q30 -10 50 -28 q-24 -2 -50 8 z"/>
    <path d="M642 400 q28 -8 46 -22 q-22 -4 -46 10 z"/>
    <path d="M625 320 q26 -8 42 -20 q-20 -4 -42 12 z"/>
  </g>
  <!-- Ink wash mist -->
  <g opacity="0.4" filter="url(#ink-blur)" fill="#b9d6e8">
    <ellipse cx="240" cy="600" rx="160" ry="22"/>
    <ellipse cx="540" cy="640" rx="200" ry="26"/>
    <ellipse cx="380" cy="700" rx="240" ry="22"/>
