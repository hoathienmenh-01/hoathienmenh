    <circle cx="280" cy="280" r="3"/>
    <circle cx="320" cy="240" r="2.4"/>
    <circle cx="380" cy="180" r="3"/>
    <circle cx="430" cy="220" r="2.4"/>
    <circle cx="480" cy="180" r="3"/>
    <circle cx="540" cy="240" r="2.4"/>
    <circle cx="580" cy="280" r="3"/>
    <circle cx="610" cy="340" r="2.4"/>
